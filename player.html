<!doctype html>
<html lang="uk">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Гравець — Вечір Абсурдних Справ</title>
  <link rel="stylesheet" href="/css/style.css"/>
</head>
<body>
  <main class="shell">
    <div class="eyebrow">secret role</div>
    <h1>Гравець</h1>

    <section class="panel narrow" id="joinCard">
      <h2>Увійти в гру</h2>
      <input id="inviteCode" placeholder="Код гри"/>
      <input id="playerName" placeholder="Твоє імʼя"/>
      <input id="playerPin" placeholder="PIN, наприклад 1234"/>
      <input id="playerAvatar" placeholder="Емодзі аватарки, наприклад ⚖"/>
      <button id="joinBtn">Увійти</button>
      <p id="joinMsg" class="error"></p>
    </section>

    <section class="panel hidden" id="playCard">
      <div class="topLine">
        <p class="muted">Гравець: <b id="meName"></b></p>
        <button class="secondary smallBtn" id="leaveBtn">Вийти</button>
      </div>
      <div id="playState">Завантаження...</div>
    </section>
  </main>
  <script type="module" src="/js/player.js"></script>
</body>
</html>
