<!doctype html>
<html lang="uk">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Адмінка — Вечір Абсурдних Справ</title>
  <link rel="stylesheet" href="/css/style.css"/>
</head>
<body>
  <main class="shell">
    <div class="eyebrow">case control</div>
    <h1>Адмінка</h1>

    <section class="panel narrow" id="createCard">
      <h2>Нова гра</h2>
      <input id="gameTitle" value="Вечір Абсурдних Справ" placeholder="Назва гри"/>
      <div class="segmented">
        <label><input type="radio" name="mode" value="court" checked> Суд</label>
        <label><input type="radio" name="mode" value="sabotage"> Саботаж</label>
        <label><input type="radio" name="mode" value="mix"> Мікс</label>
      </div>
      <button id="createBtn">Створити гру</button>
      <p id="createMsg" class="error"></p>
    </section>

    <section class="panel hidden" id="hostCard">
      <div class="topLine">
        <div>
          <button class="linkButton" id="newGameBtn">← Нова гра</button>
          <h2 id="hostTitle">Гра</h2>
        </div>
        <div class="actions">
          <button class="secondary" id="refreshBtn">Оновити</button>
          <button class="danger" id="finishBtn">Завершити</button>
        </div>
      </div>

      <div class="inviteGrid">
        <div>
          <p class="muted">Інвайт для гравців</p>
          <div class="invite" id="playerInvite"></div>
        </div>
        <div>
          <p class="muted">TV/глядацький екран</p>
          <div class="invite" id="viewerInvite"></div>
        </div>
      </div>

      <section class="hostLayout">
        <div>
          <h2>Поточна справа</h2>
          <div id="caseState" class="miniState"></div>
          <div id="resultPanel"></div>
        </div>
        <div>
          <h2>Керування</h2>
          <button class="bigNext" id="nextBtn">Запустити справу</button>
          <p class="muted" id="nextHint"></p>
          <details class="detailsBox">
            <summary>Налаштування наступної справи</summary>
            <div class="segmented vertical">
              <label><input type="radio" name="nextMode" value="court" checked> Суд присяжних</label>
              <label><input type="radio" name="nextMode" value="sabotage"> Таємний саботажник</label>
              <label><input type="radio" name="nextMode" value="auto"> Авто/мікс</label>
            </div>
          </details>
        </div>
      </section>

      <section class="grid2">
        <div>
          <h2>Гравці</h2>
          <div id="playersList"></div>
        </div>
        <div>
          <h2>Рейтинг</h2>
          <div id="scoreBoard"></div>
        </div>
      </section>
    </section>
  </main>
  <script type="module" src="/js/admin.js"></script>
</body>
</html>
